plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'org.jetbrains.kotlin.plugin.compose'
    // id 'org.mozilla.rust-android-gradle.rust-android'
}

configurations {
    onnxRuntime
}

// Task to extract libonnxruntime.so for the Rust build
task extractOnnxLib(type: Copy) {
    from {
        zipTree(configurations.onnxRuntime.singleFile)
    }
    into "${project.buildDir}/onnxruntime"
    include "jni/arm64-v8a/libonnxruntime.so"
}

android {
    namespace 'com.brahmadeo.supertonic.tts'
    compileSdk 34
    ndkVersion "29.0.14206865"

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }

    defaultConfig {
        applicationId "com.brahmadeo.supertonic.tts"
        minSdk 24
        targetSdk 34
        versionCode 4
        versionName "1.3"
        
        ndk {
            abiFilters "arm64-v8a"
        }
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        compose true
        aidl true
    }
    
    packaging {
        jniLibs {
            useLegacyPackaging = true
            pickFirst 'lib/arm64-v8a/libonnxruntime.so'
            pickFirst 'lib/arm64-v8a/libsupertonic_tts.so'
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.media:media:1.7.0'

    // Compose Bridge & Material 3 Expressive
    def composeBom = platform('androidx.compose:compose-bom:2024.02.00')
    implementation composeBom
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3:1.2.1'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.23.2'
    onnxRuntime 'com.microsoft.onnxruntime:onnxruntime-android:1.23.2'
    
    debugImplementation 'androidx.compose.ui:ui-tooling'
}
