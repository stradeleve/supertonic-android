plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'org.jetbrains.kotlin.plugin.compose'
    id 'org.mozilla.rust-android-gradle.rust-android'
}

configurations {
    onnxRuntime
}

cargo {
    module = "../rust"
    libname = "supertonic_tts"
    targets = ["arm64"]
    profile = "release"
    pythonCommand = "python3"

    // F-Droid Fix: Robustly find rustc/cargo
    def home = System.getenv("HOME")
    def path = System.getenv("PATH")
    println "DEBUG: HOME=$home"
    println "DEBUG: PATH=$path"
    
    def cargoBin = null
    def rustcBin = null

    // 1. Try resolving from standard locations
    def candidatePaths = [
        "${home}/.cargo/bin",
        "/home/vagrant/.cargo/bin", // Explicit F-Droid path
        "/usr/local/cargo/bin",
        "/usr/bin",
        "/usr/local/bin"
    ]
    
    for (String loc : candidatePaths) {
        def cargo = new File(loc, "cargo")
        def rustc = new File(loc, "rustc")
        if (cargo.exists() && cargoBin == null) cargoBin = cargo.absolutePath
        if (rustc.exists() && rustcBin == null) rustcBin = rustc.absolutePath
    }

    if (cargoBin != null) {
        println "DEBUG: Found cargo at $cargoBin"
        cargoCommand = cargoBin
    }
    if (rustcBin != null) {
        println "DEBUG: Found rustc at $rustcBin"
        rustcCommand = rustcBin
    }
}

// Task to extract libonnxruntime.so for the Rust build
task extractOnnxLib(type: Copy) {
    from {
        zipTree(configurations.onnxRuntime.singleFile)
    }
    into "${project.buildDir}/onnxruntime"
    include "jni/arm64-v8a/libonnxruntime.so"
}

// Task to manually copy the built Rust library to a location Gradle WILL package
task copyRustLibs(type: Copy) {
    dependsOn 'cargoBuild'
    from "${project.buildDir}/rustJniLibs/android"
    into "${project.buildDir}/finalJniLibs"
}

// Configure cargoBuild task
tasks.whenTaskAdded { task ->
    if (task.name == 'cargoBuild' || task.name == 'cargoBuildArm64') {
        task.dependsOn extractOnnxLib
        if (task.hasProperty('environment')) {
            task.environment 'ORT_LIB_LOCATION', "${project.buildDir}/onnxruntime/jni/arm64-v8a"
            task.environment 'ORT_SKIP_DOWNLOAD', '1'
        }
    }
    if (task.name.startsWith('merge') && (task.name.endsWith('NativeLibs') || task.name.endsWith('JniLibFolders'))) {
        task.dependsOn copyRustLibs
    }
}

android {
    namespace 'com.brahmadeo.supertonic.tts'
    compileSdk 36
    ndkVersion "29.0.14206865"

    sourceSets {
        main {
            // Overridden in afterEvaluate
        }
    }

    defaultConfig {
        applicationId "com.brahmadeo.supertonic.tts"
        minSdk 24
        targetSdk 36
        versionCode 7
        versionName "2.7.1"
        
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'androidx.media3' && details.requested.name != 'media3-common-ktx') {
                details.useVersion '1.3.1'
            }
            if (details.requested.group == 'androidx.core' && details.requested.name != 'core-viewtree') {
                details.useVersion '1.13.1'
            }
            if (details.requested.group == 'androidx.recyclerview') {
                details.useVersion '1.3.2'
            }
            if (details.requested.group == 'androidx.lifecycle') {
                details.useVersion '2.8.4'
            }
        }
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        compose true
        aidl true
    }
    
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
            pickFirst 'lib/arm64-v8a/libonnxruntime.so'
            pickFirst 'lib/arm64-v8a/libsupertonic_tts.so'
        }
    }
}

afterEvaluate {
    android.sourceSets.main.jniLibs.setSrcDirs(["src/main/jniLibs", "${project.buildDir}/finalJniLibs"])
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.2'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.media:media:1.7.0'

    // Compose Bridge & Material 3 Expressive
    def composeBom = platform('androidx.compose:compose-bom:2024.02.00')
    implementation composeBom
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3:1.4.0-alpha04'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.24.1'
    onnxRuntime 'com.microsoft.onnxruntime:onnxruntime-android:1.24.1'
    
    // Readium Toolkit
    implementation ("org.readium.kotlin-toolkit:readium-shared:$readium_version")
    implementation ("org.readium.kotlin-toolkit:readium-streamer:$readium_version")
    implementation ("org.readium.kotlin-toolkit:readium-adapter-pdfium:$readium_version") {
        exclude group: 'androidx.media3', module: 'media3-common-ktx'
    }

    implementation 'com.tom-roush:pdfbox-android:2.0.27.0'

    debugImplementation 'androidx.compose.ui:ui-tooling'
}
