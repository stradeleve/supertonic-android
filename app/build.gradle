android {
    namespace 'com.brahmadeo.supertonic.tts'
    compileSdk 34
    ndkVersion "29.0.14206865"

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }

    defaultConfig {
        applicationId "com.brahmadeo.supertonic.tts"
        minSdk 24
        targetSdk 34
        versionCode 5
        versionName "1.9"

        ndk {
            abiFilters "arm64-v8a"
        }
    }

    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'androidx.media3' && details.requested.name != 'media3-common-ktx') {
                details.useVersion '1.3.1'
            }
            if (details.requested.group == 'androidx.core' && details.requested.name != 'core-viewtree') {
                details.useVersion '1.13.1'
            }
            if (details.requested.group == 'androidx.recyclerview') {
                details.useVersion '1.3.2'
            }
            if (details.requested.group == 'androidx.lifecycle') {
                details.useVersion '2.8.4'
            }
        }
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    buildFeatures {
        compose true
        aidl true
    }
    
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
            pickFirst 'lib/arm64-v8a/libonnxruntime.so'
            pickFirst 'lib/arm64-v8a/libsupertonic_tts.so'
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.2'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.media:media:1.7.0'

    // Compose Bridge & Material 3
    def composeBom = platform('androidx.compose:compose-bom:2024.02.00')
    implementation composeBom
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3:1.2.1'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.24.1'
    onnxRuntime 'com.microsoft.onnxruntime:onnxruntime-android:1.24.1'
    
    // Readium Toolkit
    implementation ("org.readium.kotlin-toolkit:readium-shared:$readium_version")
    implementation ("org.readium.kotlin-toolkit:readium-streamer:$readium_version")
    implementation ("org.readium.kotlin-toolkit:readium-adapter-pdfium:$readium_version") {
        exclude group: 'androidx.media3', module: 'media3-common-ktx'
    }

    implementation 'com.tom-roush:pdfbox-android:2.0.27.0'

    debugImplementation 'androidx.compose.ui:ui-tooling'
}
