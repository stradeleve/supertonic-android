plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'org.jetbrains.kotlin.plugin.compose'
    // id 'org.mozilla.rust-android-gradle.rust-android'
}

configurations {
    onnxRuntime
}

