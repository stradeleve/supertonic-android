name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_bundle:
        description: 'Build Android App Bundle (.aab)'
        required: true
        type: boolean
        default: false 

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    permissions: 
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties

      - name: Add NDK toolchain to PATH
        run: |
          echo "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Configure Rust for F-Droid style build
        run: |
          cd rust
          cargo vendor vendor
          mkdir -p .cargo
          cat <<EOF > .cargo/config.toml
          [target.aarch64-linux-android]
          linker = "aarch64-linux-android34-clang"
          [target.armv7-linux-androideabi]
          linker = "armv7a-linux-androideabi34-clang"
          [target.i686-linux-android]
          linker = "i686-linux-android34-clang"
          [target.x86_64-linux-android]
          linker = "x86_64-linux-android34-clang"
          [source.crates-io]
          replace-with = "vendored-sources"
          [source.vendored-sources]
          directory = "vendor"
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine if bundle should be built
        id: determine_bundle
        run: |
          BUILD_BUNDLE="false"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BUILD_BUNDLE="true"
          elif [[ "${{ github.event.inputs.build_bundle }}" == "true" ]]; then
            BUILD_BUNDLE="true"
          fi
          echo "build_bundle=${BUILD_BUNDLE}" >> $GITHUB_OUTPUT

      - name: Build Release APK (arm64 only)
        run: ./gradlew assembleRelease -PrustTargets=arm64

      - name: Build Release Bundle (all targets)
        if: steps.determine_bundle.outputs.build_bundle == 'true'
        run: ./gradlew bundleRelease

      - name: Sign APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Sign Bundle
        if: steps.determine_bundle.outputs.build_bundle == 'true'
        id: sign_bundle
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Clean Ref Name
        id: clean_ref
        run: |
          CLEAN_NAME=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "clean_ref_name=${CLEAN_NAME}" >> $GITHUB_OUTPUT

      - name: Rename Signed Assets
        run: |
          mv ${{ steps.sign_apk.outputs.signedReleaseFile }} app/build/outputs/apk/release/Supertonic-${{ steps.clean_ref.outputs.clean_ref_name }}.apk
          if [[ "${{ steps.determine_bundle.outputs.build_bundle }}" == "true" ]]; then
            mv ${{ steps.sign_bundle.outputs.signedReleaseFile }} app/build/outputs/bundle/release/Supertonic-${{ steps.clean_ref.outputs.clean_ref_name }}.aab
          fi

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Supertonic-Build-${{ steps.clean_ref.outputs.clean_ref_name }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/Supertonic-${{ steps.clean_ref.outputs.clean_ref_name }}.apk
            app/build/outputs/bundle/release/Supertonic-${{ steps.clean_ref.outputs.clean_ref_name }}.aab
          fail_on_unmatched_files: false
