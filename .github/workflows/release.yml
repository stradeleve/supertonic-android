name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    permissions: 
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties

      - name: Add NDK toolchain to PATH
        run: |
          echo "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Configure Rust for F-Droid style build
        run: |
          cd rust
          cargo vendor vendor
          mkdir -p .cargo
          cat <<EOF > .cargo/config.toml
          [target.aarch64-linux-android]
          linker = "aarch64-linux-android34-clang"
          [target.armv7-linux-androideabi]
          linker = "armv7a-linux-androideabi34-clang"
          [target.i686-linux-android]
          linker = "i686-linux-android34-clang"
          [target.x86_64-linux-android]
          linker = "x86_64-linux-android34-clang"
          [source.crates-io]
          replace-with = "vendored-sources"
          [source.vendored-sources]
          directory = "vendor"
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK (arm64 only)
        run: ./gradlew assembleRelease -PrustTargets=arm64

      - name: Build Release Bundle (all targets)
        run: ./gradlew bundleRelease

      - name: Sign APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Sign Bundle
        id: sign_bundle
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Rename Signed Assets
        run: |
          mv ${{ steps.sign_apk.outputs.signedReleaseFile }} app/build/outputs/apk/release/Supertonic-${{ github.ref_name }}.apk
          mv ${{ steps.sign_bundle.outputs.signedReleaseFile }} app/build/outputs/bundle/release/Supertonic-${{ github.ref_name }}.aab

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Supertonic-Build-${{ github.ref_name }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/Supertonic-${{ github.ref_name }}.apk
            app/build/outputs/bundle/release/Supertonic-${{ github.ref_name }}.aab
