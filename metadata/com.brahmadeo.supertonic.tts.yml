Builds:
  - versionName: 2.7.1
    versionCode: 7
    commit: 54839382efeb7bc451ca8e989aad8ee851616c92
    sudo:
      - apt-get update
      - apt-get install -y gcc libc-dev rustup pkg-config libssl-dev
    gradle:
      - yes
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    prebuild:
      - rustup default 1.94.1
      - rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android
        x86_64-linux-android
      - cd rust
      - cargo vendor vendor
      - mkdir -p rust/.cargo
      - echo '[target.aarch64-linux-android]' > rust/.cargo/config.toml
      - echo 'linker = "aarch64-linux-android34-clang"' >> rust/.cargo/config.toml
      - echo '[source.crates-io]' >> rust/.cargo/config.toml
      - echo 'replace-with = "vendored-sources"' >> rust/.cargo/config.toml
      - echo '[source.vendored-sources]' >> rust/.cargo/config.toml
      - echo 'directory = "vendor"' >> rust/.cargo/config.toml
    scanignore:
      - rust/vendor/regex-automata/tests/fuzz/testdata
      - rust/vendor/vcpkg/test-data
    scandelete:
      - rust/vendor/winapi-x86_64-pc-windows-gnu/lib
      - rust/vendor/winapi-i686-pc-windows-gnu/lib
      - rust/vendor/windows_aarch64_gnullvm/lib
      - rust/vendor/windows_x86_64_gnullvm/lib
      - rust/vendor/windows_x86_64_gnu/lib
      - rust/vendor/windows_i686_gnu/lib
      - rust/vendor/wit-bindgen
    ndk: r29

